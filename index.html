<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<meta name="theme-color"
      content="#12345b">

<link rel="manifest"
      href="manifest.json">

<link rel="icon"
      href="icons/icon-192.png">

<title>Olho da Dona</title>

<link rel="stylesheet"
      href="css/app.css">

</head>

<body>

<!-- Splash -->

<div id="splash">

    <img
        src="icons/icon-512.png"
        class="logo">

    <h1>
        Olho da Dona
    </h1>

    <p>
        Acompanhando seu imóvel
    </p>

</div>


<!-- Tela de Boas-vindas -->

<div id="boasVindas" style="display:none;">

    <div class="boasConteudo">

        <img
            src="icons/icon-192.png"
            class="logo">

        <h2>
            Bem-vindo!
        </h2>

        <p id="textoBoasVindas">

        </p>

        <button id="continuar">
            Continuar
        </button>

    </div>

</div>


<!-- Portal -->

<iframe
    id="portal"
    frameborder="0"
    style="display:none;">
</iframe>


<!-- Botão de instalação (quando suportado pelo navegador) -->

<button
    id="instalar"
    style="display:none;">
    📲 Instalar Olho da Dona
</button>


<script src="js/app.js"></script>

</body>

</html>
